name: Build InkNote

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet publish src/InkNote -c Release -r win-x64 --self-contained -o publish
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      - name: Create ZIP
        run: Compress-Archive -Path publish\* -DestinationPath InkNote_win-x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InkNote-win-x64
          path: InkNote_win-x64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: InkNote_win-x64.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}